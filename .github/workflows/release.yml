name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # build:css compiles ui/input.css -> ui/styles.css, then electron-builder
      # produces the portable exe and the NSIS installer under dist/.
      - run: npm run dist -- --publish never

      # Always keep the binaries as workflow artifacts (useful for test runs
      # triggered manually without a tag).
      - uses: actions/upload-artifact@v4
        with:
          name: PAMP-windows
          path: |
            dist/PAMP-*-portable.exe
            dist/PAMP-*-setup.exe

      # On a v* tag, publish a GitHub release with the binaries attached.
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/PAMP-*-portable.exe
            dist/PAMP-*-setup.exe
          generate_release_notes: true
